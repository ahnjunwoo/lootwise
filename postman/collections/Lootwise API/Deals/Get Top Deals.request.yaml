$kind: http-request
name: Get Top Deals
method: GET
url: '{{baseUrl}}/api/v1/deals'
description: Returns discounted deals sorted by discountPercent desc and totalReviews desc.
order: 1000
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: limit
    value: '{{limit}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
