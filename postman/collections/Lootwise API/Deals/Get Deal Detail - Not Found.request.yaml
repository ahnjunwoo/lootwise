$kind: http-request
name: Get Deal Detail - Not Found
method: GET
url: '{{baseUrl}}/api/v1/deals/999999999'
description: Not found example.
order: 5000
headers:
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 404", function () {
          pm.response.to.have.status(404);
      });
