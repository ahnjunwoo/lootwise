version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: lootwise-postgres
    environment:
      POSTGRES_DB: lootwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lootwise"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - lootwise-postgres-data:/var/lib/postgresql/data

volumes:
  lootwise-postgres-data:
